name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Frontend — install and build (type-checks via tsc)
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Core daemon
        run: cargo build --release -p keyscape-core --locked

      # The Tauri shell bundles the core exe + example effects as resources,
      # and tauri-build validates those paths at compile time — so they must
      # exist before the shell builds (same staging as the release workflow).
      - name: Stage bundle resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ui/src-tauri/binaries/effects | Out-Null
          Copy-Item target/release/keyscape-core.exe ui/src-tauri/binaries/
          Copy-Item examples/js-effects/*.js ui/src-tauri/binaries/effects/

      - name: UI shell
        run: cargo build -p keyscape --locked

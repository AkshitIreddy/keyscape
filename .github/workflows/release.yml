name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build installer and portable zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Frontend
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Core daemon
        run: cargo build --release -p keyscape-core --locked

      - name: Stage bundle resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ui/src-tauri/binaries/effects | Out-Null
          Copy-Item target/release/keyscape-core.exe ui/src-tauri/binaries/
          Copy-Item examples/js-effects/*.js ui/src-tauri/binaries/effects/

      - name: NSIS installer
        working-directory: ui
        run: npx tauri build --bundles nsis

      - name: Portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist-pkg | Out-Null
          Copy-Item target/release/keyscape-core.exe, target/release/Keyscape.exe, README.md, LICENSE dist-pkg/
          Copy-Item -Recurse docs dist-pkg/docs
          Copy-Item -Recurse examples dist-pkg/examples
          Compress-Archive -Path dist-pkg/* -DestinationPath "Keyscape-${{ github.ref_name }}-windows-x64-portable.zip"

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $lines = Get-Content CHANGELOG.md
          $out = @(); $inSection = $false
          foreach ($l in $lines) {
            if ($l -match "^##\s+\[?$([regex]::Escape($ver))\]?") { $inSection = $true; continue }
            elseif ($inSection -and $l -match "^##\s") { break }
            elseif ($inSection) { $out += $l }
          }
          $body = ($out -join "`n").Trim()
          if (-not $body) { $body = "See the commit history for changes in this release." }
          $body | Set-Content release-notes.md -Encoding utf8
          Write-Host "--- release notes ---`n$body"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            Keyscape-*-portable.zip
          body_path: release-notes.md

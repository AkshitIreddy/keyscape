name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build frontend
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist-pkg | Out-Null
          Copy-Item target/release/keyscape-core.exe, target/release/Keyscape.exe, README.md, LICENSE, tools/install.ps1 dist-pkg/
          Compress-Archive -Path dist-pkg/* -DestinationPath "Keyscape-${{ github.ref_name }}-windows-x64.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Keyscape-*.zip
          generate_release_notes: true
